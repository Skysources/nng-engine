  tbody tr:hover{background:#f9fafb}
  .hbtn:hover{background:#f6f7f8;border-color:#c4ccd4}
  .pbtn:hover{background:var(--accent-d)!important;border-color:var(--accent-d)!important}

function tint(hex,a){const m=hex.replace('#','');const n=parseInt(m.length===3?m.split('').map(c=>c+c).join(''):m,16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}

function num(v){const p=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,''));return isNaN(p)?null:p;}
function dot(st){return st.hatch?('repeating-linear-gradient(45deg,'+st.dark+' 0 4px,'+st.color+' 4px 8px)'):st.color;}

function setSync(s){
  const map={ok:['#16a34a','Bağlı'],sync:['#d4a017','Senkronize ediliyor…'],saving:['#d4a017','Kaydediliyor…'],err:['#dc2626','Bağlantı yok (yerel)'],idle:['#cbd2d9','—']};
  const v=map[s]||map.idle, el=$('syncDot');
  if(el) el.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${v[0]}"></span>${v[1]}`;
}
async function fbLoad(){
  setSync('sync');
  try{
    const r=await fetch(FB,{cache:'no-store'});
    if(!r.ok){ setSync('err'); return false; }
    const d=await r.json();
    if(d && Array.isArray(d.motors) && d.motors.length){ _ts=d.ts||0; state.engines=d.motors; cache(state.engines); setSync('ok'); return true; }
    setSync('ok'); return false;
  }catch(e){ setSync('err'); return false; }
}
async function fbSave(){
  if(!canEdit()) return;
  const ts=Date.now(); _ts=ts; _saving=true; setSync('saving');
  cache(state.engines);
  try{
    const r=await fetch(FB,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({motors:state.engines, ts})});
    setSync(r.ok?'ok':'err');
  }catch(e){ setSync('err'); }
  finally{ _saving=false; }
}
function startPoll(){
  if(_poll) return;
  _poll=setInterval(async()=>{
    if(_saving || state.modalOpen || state.confirmId) return;
    try{
      const r=await fetch(FB,{cache:'no-store'}); if(!r.ok){ setSync('err'); return; }
      const d=await r.json();
      setSync('ok');
      if(d && d.ts && d.ts>_ts && Array.isArray(d.motors)){ _ts=d.ts; state.engines=d.motors; cache(state.engines); render(); }
    }catch(e){ setSync('err'); }
  }, 5000);
}
async function initData(){
  // 1) hızlı açılış için yerel yedek
  let local=null;
  try{ const raw=localStorage.getItem(STORE); if(raw) local=JSON.parse(raw); }catch(e){}
  if(local && Array.isArray(local) && local.length){ state.engines=local; render(); }
  // 2) sunucudan ortak veri
  const got=await fbLoad();
  if(!got){
    if(!state.engines.length){ state.engines=seed(); }
    await fbSave();           // ilk kurulumda tohum veriyi sunucuya yaz
  }
  render();
  startPoll();
}

/* ======================= COMPUTE + RENDER ======================= */
function compute(){
  const S=STATUSES, all=state.engines, q=state.q.trim().toLowerCase();
  const filtered=all.filter(e=>{
    if(state.fStatus!=='all' && e.status!==state.fStatus) return false;
    if(state.fLocation!=='all' && locGroup(e.location)!==state.fLocation) return false;
    if(state.fType!=='all' && e.type!==state.fType) return false;
    if(state.fFuel!=='all' && (e.fuel||'').trim()!==state.fFuel) return false;
    if(q){
      const stLabel=(S[e.status]||S.unknown).label;
      const blob=[e.from,e.type,e.serial,e.idNo,e.injector,e.project,e.actuator,e.fuel,e.version,e.power,e.operation,e.location,e.note,stLabel].join(' ').toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });
  let rows=filtered.slice();
  if(state.sortKey){
    const dir=state.sortDir==='asc'?1:-1, numK={power:1,operation:1}, order=Object.keys(S);
    rows.sort((a,b)=>{
      if(state.sortKey==='status') return (order.indexOf(a.status)-order.indexOf(b.status))*dir;
      if(numK[state.sortKey]){
        const av=num(a[state.sortKey]), bv=num(b[state.sortKey]);
        if(av===null&&bv===null)return 0; if(av===null)return 1; if(bv===null)return -1;
        return (av-bv)*dir;
      }
      return String(a[state.sortKey]||'').localeCompare(String(b[state.sortKey]||''),'tr')*dir;
    });
  }
  return {all, filtered, rows};
}

function uploadPhoto(inputEl, fieldKey){
  const file=inputEl.files && inputEl.files[0];
  inputEl.value='';
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=1000; let w=img.width, h=img.height;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      let data;
      try{ const cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); data=cv.toDataURL('image/jpeg',0.82); }
      catch(err){ data=reader.result; }
      state.form[fieldKey]=data; renderModal();
    };
    img.onerror=()=>{ state.form[fieldKey]=reader.result; renderModal(); };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

function cardHTML(e){
  const st=STATUSES[e.status]||STATUSES.unknown;
  const powerDisp=(has(e.power)&&e.power!=='n/a')?e.power:'—';
  const opDisp=(has(e.operation)&&e.operation!=='n/a'&&e.operation!=='...')?e.operation:'—';
  const badgeStyle='background:'+tint(st.color,0.12)+';color:'+st.dark+';border:1px solid '+tint(st.color,0.28);
  const boroHref=link(e.boroscope), rehabHref=link(e.rehab);
  const chip=(t,mono)=>`<span style="${mono?"font-family:'IBM Plex Mono',monospace;color:#46505c;background:#eef1f3":"color:#6b7682;background:#f5f6f8"};font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px">${esc(t)}</span>`;
  const field=(lbl,val,mono)=>`<div><div style="font-size:8.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#9aa3ad;margin-bottom:1px">${lbl}</div><div style="${mono!==false?"font-family:'IBM Plex Mono',monospace;":''}font-size:11px;color:#2b3540;word-break:break-all">${esc(has(val)?val:'—')}</div></div>`;
  const magBadge=`<span style="position:absolute;right:5px;bottom:5px;display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:5px;background:rgba(22,32,46,.72);color:#fff"><svg width="10" height="10" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 5.2v3.6M5.2 7h3.6M10.5 10.5 14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></span>`;
  const noEngSvg=`<span style="display:flex;flex-direction:column;align-items:center;gap:3px;color:#aeb6bf"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12.5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8.5 6 9.7 4h4.6L15.5 6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg><span style="font-size:8.5px;font-weight:600;letter-spacing:.03em">Motor fotoğrafı yok</span></span>`;
  const noInjSvg=`<span style="display:flex;flex-direction:column;align-items:center;gap:2px;color:#aeb6bf"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12.5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8.5 6 9.7 4h4.6L15.5 6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg><span style="font-size:8px;font-weight:600;letter-spacing:.03em">Foto yok</span></span>`;
  const engBox = has(e.enginePhoto)
    ? `<div data-photoeng="${e.id}" title="Büyütmek için tıklayın" style="margin-top:9px;position:relative;width:100%;height:78px;border-radius:9px;overflow:hidden;background:#eef1f3;border:1px solid #e3e7eb;cursor:zoom-in"><img src="${esc(e.enginePhoto)}" alt="Motor" style="width:100%;height:100%;object-fit:cover;display:block">${magBadge}</div>`
    : `<div style="margin-top:9px;width:100%;height:78px;border-radius:9px;overflow:hidden;background:#eef1f3;border:1px solid #e3e7eb;display:flex;align-items:center;justify-content:center">${noEngSvg}</div>`;
  let reports='';
  if(has(e.boroscope)) reports+=`<a ${boroHref?`href="${esc(boroHref)}" target="_blank" rel="noopener"`:'style="cursor:default"'} style="display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--accent-d);background:rgba(31,157,87,.1);padding:3px 8px;border-radius:6px;text-decoration:none"><svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M9 1.5H4.5A1.5 1.5 0 0 0 3 3v10a1.5 1.5 0 0 0 1.5 1.5h7A1.5 1.5 0 0 0 13 13V5.5L9 1.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M9 1.5V5.5H13" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>Boroskop</a>`;
  if(has(e.rehab)) reports+=`<a ${rehabHref?`href="${esc(rehabHref)}" target="_blank" rel="noopener"`:'style="cursor:default"'} style="display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:#7c5cba;background:rgba(124,92,186,.1);padding:3px 8px;border-radius:6px;text-decoration:none"><svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M9 1.5H4.5A1.5 1.5 0 0 0 3 3v10a1.5 1.5 0 0 0 1.5 1.5h7A1.5 1.5 0 0 0 13 13V5.5L9 1.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M9 1.5V5.5H13" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>Rehabilitasyon</a>`;
  const reportsHtml = reports ? `<div style="margin-top:auto;padding-top:11px;display:flex;flex-direction:column;gap:5px;align-items:flex-start">${reports}</div>` : '';
  const actions = canEdit() ? `<div style="display:flex;gap:5px;flex:none">
        <button data-edit="${e.id}" class="ico" title="Düzenle" style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;border:1px solid #e1e5ea;background:#fff;color:#6b7682;cursor:pointer"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M11 2.5 13.5 5 5.5 13l-3 .5.5-3 8-8Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg></button>
        <button data-del="${e.id}" class="ico del" title="Sil" style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;border:1px solid #e1e5ea;background:#fff;color:#6b7682;cursor:pointer"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M6.5 4.5V3a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1.5M5 4.5 5.5 13a1 1 0 0 0 1 .9h3a1 1 0 0 0 1-.9L11 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>` : '';
  const noteHtml = has(e.note) ? `<div style="margin-top:10px;font-size:11px;line-height:1.4;color:#6b7682;background:#f7f8f9;border-radius:7px;padding:6px 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(e.note)}</div>` : '';
  const injThumb = has(e.injectorPhoto)
    ? `<div data-photoinj="${e.id}" title="Büyütmek için tıklayın" style="position:relative;width:78px;flex:none;background:#eef1f3;cursor:zoom-in"><img src="${esc(e.injectorPhoto)}" alt="Enjektör" style="width:100%;height:100%;object-fit:cover;display:block">${magBadge}</div>`
    : `<div style="width:78px;flex:none;background:#eef1f3;display:flex;align-items:center;justify-content:center">${noInjSvg}</div>`;
  const liqDisp=has(e.injLiquid)?e.injLiquid:'—', gasDisp=has(e.injGas)?e.injGas:'—';
  const injBox = `<div style="margin-top:11px"><div style="display:flex;border:1px solid #e3e7eb;border-radius:9px;background:#fbfcfd;overflow:hidden">
        ${injThumb}
        <div style="flex:1;min-width:0;padding:7px 9px;display:flex;flex-direction:column;justify-content:center">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:8px;font-weight:700;letter-spacing:.08em;color:#9aa3ad">ENJEKTÖR</span>
            ${has(e.fuel)?`<span style="font-size:8.5px;font-weight:700;color:#46505c;background:#e6eaee;padding:1px 6px;border-radius:5px">${esc(e.fuel)}</span>`:''}
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#2b3540;margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(has(e.injector)?e.injector:'—')}</span>
          </div>
          <div style="margin-top:6px;display:flex;gap:6px">
            <span style="display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:600;color:#1d6fa3;background:#e8f2f8;border-radius:5px;padding:2px 7px"><svg width="9" height="9" viewBox="0 0 16 16" fill="none"><path d="M8 2s4 4.6 4 7.5A4 4 0 1 1 4 9.5C4 6.6 8 2 8 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>Sıvı ${esc(liqDisp)}</span>
            <span style="display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:600;color:#9a6a16;background:#f6efe2;border-radius:5px;padding:2px 7px"><svg width="9" height="9" viewBox="0 0 16 16" fill="none"><path d="M8 14c2.8 0 4.5-1.9 4.5-4.3 0-3-2.5-4.7-2-7.7-2 .8-5 3.4-5 7C5.5 8.4 6 9 6 9s-.5-.4-.5-1.4C4.2 9 3.5 10.2 3.5 11.5 3.5 13 5.2 14 8 14Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>Gaz ${esc(gasDisp)}</span>
          </div>
        </div>
      </div></div>`;
  return `<div class="card-el" style="background:#fff;border:1px solid #e6e9ed;border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(20,30,45,.04),0 3px 10px rgba(20,30,45,.045);display:flex">
    <div style="width:4px;flex:none;background:${bar(st)}"></div>
    <div style="padding:12px 13px;display:flex;gap:13px;flex:1;min-width:0">

      <div style="flex:none;width:124px;min-width:0;display:flex;flex-direction:column">
        <div style="font-size:13.5px;font-weight:600;letter-spacing:-.01em;color:#16202e;line-height:1.2">${esc(e.from)}</div>
        <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
          ${has(e.type)?chip(e.type,true):''}${has(e.fuel)?chip(e.fuel,false):''}
        </div>
        ${engBox}
        <div style="margin-top:11px"><span style="font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#16202e;letter-spacing:-.02em">${esc(powerDisp)}</span><span style="font-size:10.5px;color:#9aa3ad;margin-left:3px">kWe</span></div>
        <div style="margin-top:5px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:#46505c">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="flex:none"><path d="M8 14.5s5-4.2 5-8a5 5 0 1 0-10 0c0 3.8 5 8 5 8Z" stroke="var(--accent)" stroke-width="1.4" stroke-linejoin="round"/><circle cx="8" cy="6.5" r="1.7" stroke="var(--accent)" stroke-width="1.4"/></svg>
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(has(e.location)?e.location:'—')}</span>
        </div>
        ${reportsHtml}
      </div>

      <div style="flex:1;min-width:0;border-left:1px solid #eef0f2;padding-left:13px;display:flex;flex-direction:column">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <span style="display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:14px;white-space:nowrap;${badgeStyle}"><span style="width:6px;height:6px;border-radius:50%;flex:none;background:${dot(st)}"></span>${esc(st.label)}</span>
          ${actions}
        </div>
        <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px 14px">
          ${field('Serial No',e.serial)}${field('ID No',e.idNo)}${field('Version',e.version,false)}${field('Project No',e.project)}${field('Actuator',e.actuator,false)}${field('Operation',opDisp)}
        </div>
        ${noteHtml}
        ${injBox}
      </div>

    </div>
  </div>`;
}

function tableHTML(rows){
  const edit=canEdit();
  const colDefs=[
    {key:'status',label:'Durum',align:'left'},{key:'from',label:'From',align:'left'},{key:'type',label:'Type',align:'left'},
    {key:'serial',label:'Serial No',align:'left'},{key:'idNo',label:'ID No',align:'left'},{key:'injector',label:'Injector SN',align:'left'},
    {key:'project',label:'Project',align:'left'},{key:'actuator',label:'Actuator',align:'left'},{key:'fuel',label:'Fuel',align:'left'},
    {key:'injLiquid',label:'Sıvı',align:'right'},{key:'injGas',label:'Gaz',align:'right'},{key:'version',label:'Version',align:'left'},
    {key:'power',label:'Power',align:'right'},{key:'operation',label:'Operation',align:'right'},{key:'location',label:'Location',align:'left'},
    {key:'note',label:'Note',align:'left',min:true},
  ];
  const th=colDefs.map(c=>{
    const active=state.sortKey===c.key;
    const arrow=active?(state.sortDir==='asc'?'▲':'▼'):'↕';
    const arrowStyle=active?'color:var(--accent);opacity:1':'opacity:.3';
    const thStyle='text-align:'+c.align+';padding:11px 14px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:'+(active?'#16202e':'#8a929c')+';border-bottom:1px solid #e6e9ed;background:'+(active?'#eef1f3':'#f7f8f9')+';white-space:nowrap;cursor:pointer;user-select:none'+(c.min?';min-width:220px':'');
    return `<th data-sort="${c.key}" title="Sırala" style="${thStyle}"><span style="display:inline-flex;align-items:center;gap:5px">${c.label}<span style="font-size:9px;line-height:1;${arrowStyle}">${arrow}</span></span></th>`;
  }).join('');
  const opTh=edit?`<th style="text-align:center;padding:11px 14px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8a929c;border-bottom:1px solid #e6e9ed;background:#f7f8f9;white-space:nowrap">İşlem</th>`:'';
  const tdBase='padding:10px 14px;border-bottom:1px solid #f0f2f4';
  const mono=`font-family:'IBM Plex Mono',monospace;color:#46505c`;
  const body=rows.map(e=>{
    const st=STATUSES[e.status]||STATUSES.unknown;
    const powerDisp=(has(e.power)&&e.power!=='n/a')?e.power:'—';
    const opDisp=(has(e.operation)&&e.operation!=='n/a'&&e.operation!=='...')?e.operation:'—';
    const opTd=edit?`<td style="${tdBase};white-space:nowrap"><div style="display:flex;gap:5px;justify-content:center">
        <button data-edit="${e.id}" class="ico" title="Düzenle" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;border:1px solid #e1e5ea;background:#fff;color:#6b7682;cursor:pointer"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M11 2.5 13.5 5 5.5 13l-3 .5.5-3 8-8Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg></button>
        <button data-del="${e.id}" class="ico del" title="Sil" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;border:1px solid #e1e5ea;background:#fff;color:#6b7682;cursor:pointer"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M6.5 4.5V3a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1.5M5 4.5 5.5 13a1 1 0 0 0 1 .9h3a1 1 0 0 0 1-.9L11 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div></td>`:'';
    return `<tr>
      <td style="${tdBase};white-space:nowrap"><span style="display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:${st.dark}"><span style="width:10px;height:10px;border-radius:3px;flex:none;background:${dot(st)}"></span>${esc(st.label)}</span></td>
      <td style="${tdBase};font-weight:600;color:#16202e;white-space:nowrap">${esc(e.from)}</td>
      <td style="${tdBase};white-space:nowrap">${esc(e.type)}</td>
      <td style="${tdBase};${mono};white-space:nowrap">${esc(e.serial)}</td>
      <td style="${tdBase};${mono};white-space:nowrap">${esc(e.idNo)}</td>
      <td style="${tdBase};${mono};white-space:nowrap">${esc(has(e.injector)?e.injector:'—')}</td>
      <td style="${tdBase};${mono};white-space:nowrap">${esc(has(e.project)?e.project:'—')}</td>
      <td style="${tdBase};white-space:nowrap">${esc(has(e.actuator)?e.actuator:'—')}</td>
      <td style="${tdBase};white-space:nowrap">${esc(e.fuel)}</td>
      <td style="${tdBase};font-family:'IBM Plex Mono',monospace;text-align:right;color:#46505c;white-space:nowrap">${esc(has(e.injLiquid)?e.injLiquid:'—')}</td>
      <td style="${tdBase};font-family:'IBM Plex Mono',monospace;text-align:right;color:#46505c;white-space:nowrap">${esc(has(e.injGas)?e.injGas:'—')}</td>
      <td style="${tdBase};white-space:nowrap">${esc(e.version)}</td>
      <td style="${tdBase};font-family:'IBM Plex Mono',monospace;text-align:right;color:#16202e;font-weight:600;white-space:nowrap">${esc(powerDisp)}</td>
      <td style="${tdBase};font-family:'IBM Plex Mono',monospace;text-align:right;color:#46505c;white-space:nowrap">${esc(opDisp)}</td>
      <td style="${tdBase};white-space:nowrap">${esc(has(e.location)?e.location:'—')}</td>
      <td style="${tdBase};color:#6b7682;line-height:1.4;min-width:200px">${esc(e.note)}</td>
      ${opTd}
    </tr>`;
  }).join('');
  return `<div style="overflow-x:auto;border:1px solid #e6e9ed;border-radius:14px;background:#fff;box-shadow:0 1px 2px rgba(20,30,45,.04),0 4px 14px rgba(20,30,45,.05)">
    <table style="border-collapse:collapse;width:100%;min-width:1280px;font-size:12.5px">
      <thead><tr>${th}${opTh}</tr></thead>
      <tbody>${body}</tbody>
    </table></div>`;
}

const FIELDS=[
  {f:'from',label:'From (Firma / Kaynak) *',full:true,ph:'örn. RHEIN ENERGIE'},
  {f:'status',label:'Durum',select:true},
  {f:'type',label:'Type',mono:true,ph:'örn. TAURUS 60'},
  {f:'serial',label:'Serial No',mono:true},
  {f:'idNo',label:'ID No',mono:true},
  {f:'injector',label:'Injector SN',mono:true},
  {f:'project',label:'Project No',mono:true},
  {f:'fuel',label:'Fuel Type',mono:true,ph:'CNV / SLX'},
  {f:'version',label:'Version'},
  {f:'power',label:'Power (kWe)',mono:true},
  {f:'operation',label:'Operation (çalışma saati)',mono:true,ph:'örn. 8145 veya n/a'},
  {f:'actuator',label:'Actuator',opts:['','Hidrolik','Elektrik'],optLabels:{'':'— Belirtilmedi —'}},
  {f:'enginePhoto',label:'Motor Fotoğrafı',photo:true},
  {divider:'Enjektör Bilgisi'},
  {f:'injLiquid',label:'Sıvı Hat Sayısı',mono:true,ph:'örn. 1'},
  {f:'injGas',label:'Gaz Hat Sayısı',mono:true,ph:'örn. 2'},
  {f:'injectorPhoto',label:'Enjektör Fotoğrafı',photo:true},
  {f:'location',label:'Location',full:true,ph:'örn. Fabrika(Overhaul), Pyro, İstanbul…'},
  {f:'boroscope',label:'Boroskop Rapor Linki',ph:'https://… veya boş'},
  {f:'rehab',label:'Rehabilitasyon Rapor Linki',ph:'https://… veya boş'},
  {f:'note',label:'Not',full:true,textarea:true,ph:'Durum, hasar, kiralama bilgisi vb.'},
];
const PHOTO_SVG='<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12.5" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M8.5 6 9.7 4h4.6L15.5 6" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>';
function renderModal(){
  const host=$('modalHost');
  if(!state.modalOpen){ host.innerHTML=''; return; }
  const f=state.form;
  const lbl='display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#8a929c;margin-bottom:6px';
  const inp='width:100%;padding:9px 11px;border:1px solid #d8dde3;border-radius:9px;font-size:13.5px;outline:none';
  const fields=FIELDS.map(d=>{
    if(d.divider){
      return `<div style="grid-column:1 / -1;border-top:1px solid #eef0f2;margin-top:2px;padding-top:12px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9aa3ad">${esc(d.divider)}</div>`;
    }
    if(d.photo){
      const val=f[d.f]||'';
      const prev=val?`<img src="${esc(val)}" alt="" style="width:66px;height:66px;object-fit:cover;border-radius:10px;border:1px solid #d8dde3;flex:none">`:'';
      const rm=val?`<button type="button" data-photorm="${d.f}" style="padding:8px 12px;border-radius:9px;border:1px solid #f3c2c2;background:#fff;color:#dc2626;font-size:12.5px;font-weight:600;cursor:pointer">Kaldır</button>`:'';
      return `<div style="grid-column:1 / -1"><label style="${lbl}">${d.label}</label><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">${prev}<label style="display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:9px;border:1px solid #d8dde3;background:#fff;color:#46505c;font-size:13px;font-weight:600;cursor:pointer">${PHOTO_SVG}Fotoğraf Seç<input type="file" accept="image/*" data-photoup="${d.f}" style="display:none"></label>${rm}</div></div>`;
    }
    const wrap=d.full?'grid-column:1 / -1':'';
    let ctl;
    if(d.select){
      ctl=`<select data-field="status" style="${inp};background:#fff;cursor:pointer">${Object.keys(STATUSES).map(k=>`<option value="${k}" ${f.status===k?'selected':''}>${esc(STATUSES[k].label)}</option>`).join('')}</select>`;
    } else if(d.opts){
      ctl=`<select data-field="${d.f}" style="${inp};background:#fff;cursor:pointer">${d.opts.map(o=>`<option value="${esc(o)}" ${(f[d.f]||'')===o?'selected':''}>${esc((d.optLabels&&d.optLabels[o])||o)}</option>`).join('')}</select>`;
    } else if(d.textarea){
      ctl=`<textarea data-field="${d.f}" rows="2" placeholder="${esc(d.ph||'')}" style="${inp};resize:vertical;line-height:1.5">${esc(f[d.f]||'')}</textarea>`;
    } else {
      ctl=`<input data-field="${d.f}" value="${esc(f[d.f]||'')}" placeholder="${esc(d.ph||'')}" style="${inp}${d.mono?";font-family:'IBM Plex Mono',monospace":''}">`;
    }
    return `<div style="${wrap}"><label style="${lbl}">${d.label}</label>${ctl}</div>`;
  }).join('');
  host.innerHTML=`<div id="ovl" style="position:fixed;inset:0;background:rgba(22,32,46,.42);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:38px 20px;overflow-y:auto;animation:fIn .15s ease">
    <div id="mbox" style="background:#fff;border-radius:16px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(20,30,45,.3);animation:mIn .2s cubic-bezier(.2,.8,.3,1);overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #eef0f2">
        <h2 style="margin:0;font-size:17px;font-weight:700;color:#16202e">${state.editId?'Motoru Düzenle':'Yeni Motor Ekle'}</h2>
        <button id="mClose" class="ico" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:none;background:#f1f3f5;color:#6b7682;cursor:pointer"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
      </div>
      <div style="padding:20px 22px;max-height:62vh;overflow-y:auto"><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 16px">${fields}</div></div>
      <div style="display:flex;justify-content:flex-end;gap:9px;padding:15px 22px;border-top:1px solid #eef0f2;background:#fafbfc">
        <button id="mCancel" class="hbtn" style="padding:9px 16px;border-radius:9px;border:1px solid #d8dde3;background:#fff;color:#46505c;font-size:13px;font-weight:600;cursor:pointer">Vazgeç</button>
        <button id="mSave" class="pbtn" style="padding:9px 18px;border-radius:9px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer">${state.editId?'Kaydet':'Ekle'}</button>
      </div>
    </div></div>`;
  host.querySelectorAll('[data-field]').forEach(el=>{
    el.addEventListener('input',ev=>{ state.form[ev.target.dataset.field]=ev.target.value; });
  });
  host.querySelectorAll('[data-photoup]').forEach(el=>{
    el.addEventListener('change',ev=>uploadPhoto(ev.target, ev.target.dataset.photoup));
  });
  host.querySelectorAll('[data-photorm]').forEach(el=>{
    el.addEventListener('click',()=>{ state.form[el.dataset.photorm]=''; renderModal(); });
  });
  $('ovl').addEventListener('mousedown',ev=>{ if(ev.target.id==='ovl') closeModal(); });
  $('mClose').onclick=closeModal;
  $('mCancel').onclick=closeModal;
  $('mSave').onclick=saveForm;
}

function renderConfirm(){
  const host=$('confirmHost');
  if(!state.confirmId){ host.innerHTML=''; return; }
  const e=state.engines.find(x=>x.id===state.confirmId);
  const name=e?e.from:'';
  host.innerHTML=`<div id="covl" style="position:fixed;inset:0;background:rgba(22,32,46,.42);backdrop-filter:blur(2px);z-index:110;display:flex;align-items:center;justify-content:center;padding:20px;animation:fIn .15s ease">
    <div style="background:#fff;border-radius:14px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(20,30,45,.3);animation:mIn .2s cubic-bezier(.2,.8,.3,1);padding:24px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:#fdecec;color:#dc2626;flex:none"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M6.5 4.5V3a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1.5M5 4.5 5.5 13a1 1 0 0 0 1 .9h3a1 1 0 0 0 1-.9L11 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <div><h3 style="margin:0;font-size:15px;font-weight:700;color:#16202e">Motoru sil</h3><div style="font-size:12.5px;color:#8a929c;margin-top:2px">Bu işlem geri alınamaz.</div></div>
      </div>
      <p style="margin:0 0 18px;font-size:13.5px;line-height:1.5;color:#46505c"><strong style="color:#16202e">${esc(name)}</strong> kaydını silmek istediğinize emin misiniz?</p>
      <div style="display:flex;justify-content:flex-end;gap:9px">
        <button id="cCancel" class="hbtn" style="padding:9px 16px;border-radius:9px;border:1px solid #d8dde3;background:#fff;color:#46505c;font-size:13px;font-weight:600;cursor:pointer">Vazgeç</button>
        <button id="cDel" style="padding:9px 18px;border-radius:9px;border:1px solid #dc2626;background:#dc2626;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Sil</button>
      </div>
    </div></div>`;
  $('covl').addEventListener('mousedown',ev=>{ if(ev.target.id==='covl') cancelDelete(); });
  $('cCancel').onclick=cancelDelete;
  $('cDel').onclick=doDelete;
}

      <input id="luser" autocomplete="username" placeholder="admin / teknik / misafir" style="width:100%;padding:11px 13px;border:1px solid #d8dde3;border-radius:10px;font-size:14px;outline:none;margin-bottom:14px">

  const sub=()=>doLogin($('luser').value, $('lpass').value);
  $('lbtn').onclick=sub;
  $('luser').addEventListener('keydown',e=>{if(e.key==='Enter')$('lpass').focus();});
  $('lpass').addEventListener('keydown',e=>{if(e.key==='Enter')sub();});
  $('luser').focus();

function doLogin(username,password){
  const u=(username||'').trim().toLowerCase();
  const rec=USERS[u];
  if(!rec || rec.password!==password){ showLogin('Kullanıcı adı veya şifre hatalı.'); return; }
  currentUser={username:u, role:rec.role};
  try{ sessionStorage.setItem(SESSION, JSON.stringify(currentUser)); }catch(e){}
  $('loginHost').innerHTML='';
  afterLogin();
}
function logout(){
  currentUser=null;
  try{ sessionStorage.removeItem(SESSION); }catch(e){}
  if(_poll){ clearInterval(_poll); _poll=null; }
  showLogin();
}
function afterLogin(){
  $('userBox').style.display='flex';
  $('userName').textContent=currentUser.username+' · '+(ROLE_LABEL[currentUser.role]||currentUser.role);
  initData();
}

/* ======================= WIRE + BOOT ======================= */
$('q').addEventListener('input',e=>{ state.q=e.target.value; render(); });
$('fLocation').addEventListener('change',e=>setState({fLocation:e.target.value}));
$('fType').addEventListener('change',e=>setState({fType:e.target.value}));
$('fFuel').addEventListener('change',e=>setState({fFuel:e.target.value}));
$('viewCard').onclick=()=>setState({view:'card'});
$('viewTable').onclick=()=>setState({view:'table'});
$('addBtn').onclick=openAdd;
$('exportBtn').onclick=exportExcel;
$('clearBtn').onclick=clearFilters;
$('logoutBtn').onclick=logout;
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if(state.photoSrc) closePhoto(); else if(state.confirmId) cancelDelete(); else if(state.modalOpen) closeModal(); } });

(function boot(){
  let s=null;
  try{ s=JSON.parse(sessionStorage.getItem(SESSION)||'null'); }catch(e){}
  if(s && s.username && USERS[s.username]){ currentUser=s; afterLogin(); }
  else { showLogin(); }
})();
</script>
